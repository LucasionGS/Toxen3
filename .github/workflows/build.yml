name: Release

on:
  push:
    branches: [release]


permissions:
  contents: write

jobs:
  release-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: yarn
      - run: yarn install --frozen-lockfile
      - run: yarn run publish
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  release-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: yarn
      - run: yarn install --frozen-lockfile
      - run: yarn run publish
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  update-aur:
    needs: release-linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup SSH for AUR
        env:
          AUR_KEY: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$AUR_KEY" | tr -d '\r' > ~/.ssh/aur
          chmod 600 ~/.ssh/aur
          ssh-keyscan aur.archlinux.org >> ~/.ssh/known_hosts
          cat > ~/.ssh/config << 'EOF'
          Host aur.archlinux.org
            IdentityFile ~/.ssh/aur
            User aur
          EOF
      - name: Configure git
        run: |
          git config --global user.name "Lucasion"
          git config --global user.email "ion@ionnet.dev"
      - name: Install pacman tools
        run: sudo apt-get update && sudo apt-get install -y pacman-package-manager
      - name: Push to AUR
        run: |
          rm -rf .aur
          mkdir -p .aur
          git clone ssh://aur@aur.archlinux.org/toxen3.git .aur
          cp PKGBUILD .aur/PKGBUILD
          cd .aur
          makepkg --printsrcinfo > .SRCINFO
          git add PKGBUILD .SRCINFO
          git diff --cached --quiet || git commit -m "Update to $(grep pkgver= PKGBUILD | cut -d= -f2)"
          git push
